<!DOCTYPE html>
<html>
<head>
    <title>Subject Closed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            min-height:100vh;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
            font-family: Arial, sans-serif;
        }
        .card{
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 24px rgba(0,0,0,0.15);
            text-align:center;
            max-width:500px;
            width:90%;
        }
        .btn{
            display:inline-block;
            margin-top:15px;
            text-decoration:none;
            padding:12px 20px;
            border-radius:24px;
            background:#2563eb;
            color:white;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>{{ subject.name }} is not available now</h2>
    <p>Current time: {{ now }}</p>
    <p>Allowed time: {{ subject.start_time }} - {{ subject.end_time }}</p>
    <a href="/home" class="btn">Back Home</a>
</div>

</body>
</html>
