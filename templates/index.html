<!DOCTYPE html>
<html>
<head>
    <title>CBT Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }
        .wrapper{
            width:90%;
            max-width:900px;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }
        .card{
            background:white;
            border-radius:20px;
            padding:30px;
            box-shadow:0 10px 24px rgba(0,0,0,0.15);
        }
        h2{
            margin-top:0;
        }
        input{
            width:100%;
            box-sizing:border-box;
            padding:12px;
            margin-bottom:14px;
            border:1px solid #ccc;
            border-radius:10px;
        }
        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:24px;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }
        .student-btn{ background:#16a34a; }
        .admin-btn{ background:#2563eb; }
        @media (max-width: 700px){
            .wrapper{ grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h2>Student Login</h2>
        <form method="POST">
            <input name="name" placeholder="Student Name" required>
            <input name="student_id" placeholder="Student ID" required>
            <button class="student-btn" type="submit">Enter Portal</button>
        </form>
    </div>

    <div class="card">
        <h2>Admin Login</h2>
        <form method="POST">
            <input name="admin_username" placeholder="Admin Username" required>
            <input name="admin_password" type="password" placeholder="Admin Password" required>
            <button class="admin-btn" type="submit">Login as Admin</button>
        </form>
    </div>
</div>

</body>
</html>
