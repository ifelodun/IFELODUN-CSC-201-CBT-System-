<!DOCTYPE html>
<html>
<head>
    <title>CSC 201 CBT - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            min-height:100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe, #43e97b);
            font-family: Arial, sans-serif;
        }
        .main-card{
            max-width: 650px;
            margin: 80px auto;
            border: none;
            border-radius: 22px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .card-header-custom{
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            color: white;
            text-align: center;
            padding: 25px;
        }
        .btn-custom{
            border-radius: 30px;
            padding: 12px 24px;
            font-weight: bold;
        }
        .welcome-text{
            color: #333;
            font-size: 1.15rem;
        }
    </style>
</head>
<body>

<div class="card main-card">
    <div class="card-header-custom">
        <h2 class="mb-1">CSC 201 CBT Platform</h2>
        <p class="mb-0">Python Programming Test Portal</p>
    </div>

    <div class="card-body text-center p-5 bg-white">
        <h3 class="mb-3 text-primary">Welcome, {{ student_name }}</h3>
        <p class="welcome-text mb-4">
            Ready to begin your exam? Click the button below to enter the student platform.
        </p>

        <a href="/student" class="btn btn-success btn-custom m-2">Start Exam</a>
        <a href="/logout" class="btn btn-danger btn-custom m-2">Logout</a>
    </div>
</div>

</body>
</html>
