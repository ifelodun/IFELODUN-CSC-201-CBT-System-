<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f6d365, #fda085);
        }

        .topbar{
            background: linear-gradient(90deg, #141e30, #243b55);
            color:white;
            padding:16px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .container{
            width:90%;
            max-width:1100px;
            margin:30px auto;
        }

        .card{
            background:white;
            border-radius:18px;
            box-shadow:0 8px 20px rgba(0,0,0,0.12);
            padding:25px;
        }

        .actions{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            gap:10px;
            flex-wrap:wrap;
        }

        .btn{
            text-decoration:none;
            padding:10px 18px;
            border-radius:24px;
            color:white;
            font-weight:bold;
            display:inline-block;
        }

        .btn-add{ background:#2563eb; }
        .btn-logout{ background:#dc2626; }
        .btn-delete{ background:#dc2626; padding:8px 14px; border-radius:18px; }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            border:1px solid #ddd;
            padding:12px;
            text-align:left;
            vertical-align:top;
        }

        th{
            background:#f3f4f6;
        }

        .empty{
            text-align:center;
            padding:30px;
            color:#555;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div><strong>Admin Dashboard</strong></div>
        <a href="/logout" class="btn btn-logout">Logout</a>
    </div>

    <div class="container">
        <div class="card">
            <div class="actions">
                <h2 style="margin:0;">CSC 201 Questions</h2>
                <a href="/add" class="btn btn-add">Add Question</a>
            </div>

            <table>
                <tr>
                    <th>#</th>
                    <th>Question</th>
                    <th>Answer</th>
                    <th>Action</th>
                </tr>

                {% if questions|length == 0 %}
                <tr>
                    <td colspan="4" class="empty">No questions added yet.</td>
                </tr>
                {% else %}
                    {% for q in questions %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ q.question }}</td>
                        <td>{{ q.answer }}</td>
                        <td>
                            <a href="/delete/{{ q.id }}" class="btn btn-delete">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                {% endif %}
            </table>
        </div>
    </div>

</body>
</html>
