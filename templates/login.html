<!DOCTYPE html>
<html>
<head>
    <title>CSC 201 CBT Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #667eea, #764ba2, #6dd5ed);
            font-family: Arial, sans-serif;
        }
        .login-card{
            width:100%;
            max-width:420px;
            border:none;
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }
        .login-header{
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            color:white;
            padding:24px;
            text-align:center;
        }
        .btn-main{
            background: linear-gradient(90deg, #11998e, #38ef7d);
            border:none;
            font-weight:bold;
            border-radius:30px;
            padding:12px;
        }
    </style>
</head>
<body>

<div class="card login-card">
    <div class="login-header">
        <h2 class="mb-1">CSC 201 CBT</h2>
        <p class="mb-0">Student & Admin Portal</p>
    </div>

    <div class="card-body p-4 bg-white">
        <form method="POST">
            <input name="username" class="form-control mb-3" placeholder="Enter name or admin">
            <input name="student_id" class="form-control mb-3" placeholder="Student ID">
            <input name="password" type="password" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-main text-white w-100">Login</button>
        </form>
    </div>
</div>

</body>
</html>
