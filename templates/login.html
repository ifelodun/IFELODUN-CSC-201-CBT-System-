<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background: linear-gradient(135deg,#667eea,#764ba2);
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .box{
            background:white;
            padding:30px;
            border-radius:20px;
            width:300px;
        }
        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            box-sizing: border-box;
        }
        button{
            width:100%;
            padding:10px;
            background:green;
            color:white;
            border:none;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>CBT Login</h2>
    <form method="POST">
        <input name="username" placeholder="Username">
        <input name="student_id" placeholder="Student ID">
        <input type="password" name="password" placeholder="Password">
        <button>Login</button>
    </form>
</div>
</body>
</html>
