<!DOCTYPE html>
<html>
<head>
    <title>Exam Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            font-family: Arial, sans-serif;
        }
        .result-card{
            max-width:500px;
            width:100%;
            border:none;
            border-radius:24px;
            box-shadow:0 15px 30px rgba(0,0,0,0.18);
        }
    </style>
</head>
<body>

<div class="card result-card text-center p-5">
    <h2 class="text-primary mb-3">Exam Result</h2>
    <h4 class="mb-3">Student: {{ student_name }}</h4>
    <h1 class="text-success">{{ score }}/{{ total }}</h1>
    <a href="/home" class="btn btn-primary mt-4">Back Home</a>
</div>

</body>
</html>
