<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
        }

        .card{
            background:white;
            border-radius:20px;
            box-shadow:0 10px 24px rgba(0,0,0,0.15);
            padding:35px;
            width:90%;
            max-width:500px;
            text-align:center;
        }

        .score{
            font-size:48px;
            font-weight:bold;
            color:#16a34a;
            margin:20px 0;
        }

        .btn{
            text-decoration:none;
            display:inline-block;
            padding:12px 22px;
            border-radius:24px;
            background:#2563eb;
            color:white;
            font-weight:bold;
            margin-top:10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Exam Result</h2>
        <p>Your score is:</p>
        <div class="score">{{ score }}/{{ total }}</div>
        <a href="/home" class="btn">Back Home</a>
    </div>

</body>
</html>
