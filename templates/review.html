<!DOCTYPE html>
<html>
<head>
    <title>Review Answers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
            min-height:100vh;
            font-family: Arial, sans-serif;
        }
        .review-card{
            border:none;
            border-radius:18px;
            box-shadow:0 10px 20px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4">Review Answers - {{ student_name }}</h2>

    {% for q in questions %}
    <div class="card review-card mb-3">
        <div class="card-body">
            <strong>{{ loop.index }}. {{ q.question }}</strong><br>
            <span class="text-primary">Your Answer: {{ answers[q.id] if answers[q.id] else "Not Answered" }}</span>
        </div>
    </div>
    {% endfor %}

    <form method="POST" action="/submit" class="text-center">
        <button class="btn btn-success btn-lg px-5">Submit Final</button>
    </form>
</div>

</body>
</html>
