<!DOCTYPE html>
<html>
<head>
    <title>Review Answers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
        }
        .container{
            width:90%;
            max-width:900px;
            margin:30px auto;
        }
        .card{
            background:white;
            border-radius:16px;
            padding:20px;
            margin-bottom:16px;
            box-shadow:0 6px 16px rgba(0,0,0,0.12);
        }
        .question{
            font-weight:bold;
            color:#1d4ed8;
            margin-bottom:10px;
        }
        .btn{
            padding:14px 24px;
            border:none;
            border-radius:25px;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }
        .submit{ background:#16a34a; }
        .back{ background:#6b7280; }
        .footer{
            text-align:center;
            padding:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">Review - {{ subject_name }}</h2>

    {% for q in questions %}
    <div class="card">
        <div class="question">
            Question {{ loop.index }}: {{ q.question }}
        </div>

        {% if answers[str(q.id)] %}
            <p>Your Answer: {{ answers[str(q.id)] }}</p>
        {% else %}
            <p style="color:red;">Not Answered</p>
        {% endif %}
    </div>
    {% endfor %}

    <div style="text-align:center;">
        <a href="/student/{{ subject_id }}"><button class="btn back">Back</button></a>

        <form method="POST" action="/submit" style="display:inline;">
            <button class="btn submit">Submit Final</button>
        </form>
    </div>
</div>

<div class="footer">
    Designed by Ifelodun | noplysola@gmail.com
</div>

</body>
</html>
