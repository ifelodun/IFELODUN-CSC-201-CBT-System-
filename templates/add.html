<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background: linear-gradient(135deg, #84fab0, #8fd3f4);
            min-height:100vh;
            font-family: Arial, sans-serif;
        }
        .form-card{
            max-width:700px;
            margin:60px auto;
            background:white;
            border:none;
            border-radius:22px;
            box-shadow:0 12px 24px rgba(0,0,0,0.15);
            padding:30px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2 class="mb-4 text-center text-primary">Add New Question</h2>

        <form method="POST">
            <input name="question" class="form-control mb-3" placeholder="Question">
            <input name="opt1" class="form-control mb-3" placeholder="Option 1">
            <input name="opt2" class="form-control mb-3" placeholder="Option 2">
            <input name="opt3" class="form-control mb-3" placeholder="Option 3">
            <input name="opt4" class="form-control mb-3" placeholder="Option 4">
            <input name="answer" class="form-control mb-3" placeholder="Correct Answer">

            <div class="d-flex justify-content-between">
                <a href="/admin" class="btn btn-secondary">Back</a>
                <button class="btn btn-success">Save Question</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
