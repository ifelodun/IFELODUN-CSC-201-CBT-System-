<!DOCTYPE html>
<html>
<head>
    <title>CSC 201 CBT Exam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(90deg, #f6d2b8, #a7c7f2);
        }

        .topbar {
            background: linear-gradient(90deg, #ff3d6e, #ff8c32);
            color: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
        }

        .pill {
            background: white;
            color: #ff4b5c;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .container {
            width: 80%;
            margin: 20px auto;
        }

        .question {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 25px;
            border: none;
            background: green;
            color: white;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="topbar">
    <div>CSC 201 CBT</div>
    <div>
        <span class="pill">Student: {{ student_name }}</span>
        <span class="pill" id="timer">Time: 120</span>
    </div>
</div>

<div class="container">

<form method="POST" action="/review" id="examForm">

{% if questions|length == 0 %}
    <h3>No questions added yet</h3>
{% else %}

    {% for q in questions %}
    <div class="question">
        <p><strong>Question {{ loop.index }}</strong></p>
        <p>{{ q.question }}</p>

        <input type="radio" name="{{ q.id }}" value="{{ q.opt1 }}"> {{ q.opt1 }}<br>
        <input type="radio" name="{{ q.id }}" value="{{ q.opt2 }}"> {{ q.opt2 }}<br>
        <input type="radio" name="{{ q.id }}" value="{{ q.opt3 }}"> {{ q.opt3 }}<br>
        <input type="radio" name="{{ q.id }}" value="{{ q.opt4 }}"> {{ q.opt4 }}<br>
    </div>
    {% endfor %}

{% endif %}

<button class="btn">Proceed to Review</button>

</form>

</div>

<script>
let time = 120;

setInterval(() => {
    time--;
    document.getElementById("timer").innerHTML = "Time: " + time;

    if (time <= 0) {
        document.getElementById("examForm").submit();
    }
}, 1000);
</script>

</body>
</html>
