<!DOCTYPE html>
<html>
<head>
    <title>Exam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff758c, #42a5f5);
        }

        .header{
            background:#ff4b2b;
            color:white;
            padding:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .container{
            width:90%;
            margin:20px auto;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:15px;
            margin-bottom:20px;
            box-shadow:0 6px 15px rgba(0,0,0,0.15);
        }

        .question{
            font-weight:bold;
            color:#1e3a8a;
            margin-bottom:10px;
        }

        label{
            display:block;
            padding:10px;
            background:#f1f5f9;
            margin-bottom:8px;
            border-radius:10px;
            cursor:pointer;
        }

        .submit-btn{
            width:100%;
            padding:15px;
            background:linear-gradient(to right, #16a34a, #22c55e);
            color:white;
            border:none;
            border-radius:25px;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        .timer{
            background:white;
            padding:6px 12px;
            border-radius:20px;
            color:red;
            font-weight:bold;
        }

        .footer{
            text-align:center;
            padding:15px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="header">
    <h3>CSC 201 CBT</h3>
    <div>
        Student: {{ student_name }} |
        <span class="timer">Time: <span id="time">{{ exam_timer }}</span></span>
    </div>
</div>

<form method="POST" action="/submit">
<div class="container">

    {% for q in questions %}
    <div class="card">
        <div class="question">
            Question {{ loop.index }}: {{ q.question }}
        </div>

        <label>
            <input type="radio" name="{{ q.id }}" value="{{ q.opt1 }}"> {{ q.opt1 }}
        </label>

        <label>
            <input type="radio" name="{{ q.id }}" value="{{ q.opt2 }}"> {{ q.opt2 }}
        </label>

        <label>
            <input type="radio" name="{{ q.id }}" value="{{ q.opt3 }}"> {{ q.opt3 }}
        </label>

        <label>
            <input type="radio" name="{{ q.id }}" value="{{ q.opt4 }}"> {{ q.opt4 }}
        </label>
    </div>
    {% endfor %}

    <button type="submit" class="submit-btn">Submit Exam</button>

</div>
</form>

<div class="footer">
    Designed by Ifelodun | noplysola@gmail.com
</div>

<script>
let time = {{ exam_timer }};

let timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
        clearInterval(timer);
        alert("Time up! Submitting...");
        document.forms[0].submit();
    }
}, 1000);
</script>

</body>
</html>
