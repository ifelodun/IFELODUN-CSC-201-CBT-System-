<!DOCTYPE html>
<html>
<head>
    <title>CSC 201 CBT Exam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ffecd2, #fcb69f, #a1c4fd, #c2e9fb);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .navbar-custom {
            background: linear-gradient(90deg, #ff416c, #ff4b2b, #ffb347);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .student-badge {
            background: white;
            color: #ff416c;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }

        .timer-box {
            background: #fff3cd;
            color: #7a4b00;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .question-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .question-header {
            background: linear-gradient(90deg, #36d1dc, #5b86e5);
            color: white;
            padding: 15px 20px;
            font-weight: bold;
        }

        .option-box {
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #f8f9fa;
            transition: 0.2s ease;
        }

        .option-box:hover {
            background: #e3f2fd;
        }

        .palette {
            position: fixed;
            right: 15px;
            top: 120px;
            width: 190px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding: 15px;
        }

        .palette button {
            width: 42px;
            margin: 4px;
            border-radius: 10px;
        }

        .answered {
            background: #28a745 !important;
            color: white !important;
            border-color: #28a745 !important;
        }

        .current {
            background: #ffc107 !important;
            color: black !important;
            border-color: #ffc107 !important;
        }

        .progress {
            height: 24px;
            border-radius: 15px;
            overflow: hidden;
        }

        .submit-btn {
            border-radius: 30px;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(90deg, #11998e, #38ef7d);
            border: none;
        }

        .submit-btn:hover {
            opacity: 0.92;
        }

        @media (max-width: 992px) {
            .palette {
                position: static;
                width: 100%;
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">CSC 201 CBT</span>

        <div class="d-flex align-items-center gap-2">
            <span class="student-badge">Student: {{ student_name }}</span>
            <span id="timer" class="timer-box">Time: 120</span>
        </div>
    </div>
</nav>

<div class="container mt-3">
    <div class="progress mb-4">
        <div id="progressBar" class="progress-bar bg-success" style="width:0%">0%</div>
    </div>
</div>

<div class="container">
    <form method="POST" action="/review" id="examForm">
        {% for q in questions %}
        <div class="card question-card" id="q{{ loop.index }}">
            <div class="question-header">
                Question {{ loop.index }}
            </div>
            <div class="card-body">
                <h5 class="mb-4 text-dark">{{ q.question }}</h5>

                {% for opt in [q.opt1, q.opt2, q.opt3, q.opt4] %}
                <div class="option-box">
                    <div class="form-check">
                        <input class="form-check-input"
                               type="radio"
                               name="{{ q.id }}"
                               value="{{ opt }}"
                               onchange="saveAnswer({{ q.id }}, {{ loop.parent.index }})">
                        <label class="form-check-label">{{ opt }}</label>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endfor %}

        <button class="btn submit-btn text-white w-100 mb-5">Proceed to Review</button>
    </form>
</div>

<div class="palette" id="palette">
    <h6 class="fw-bold text-primary">Question Palette</h6>
    {% for q in questions %}
    <button type="button"
            id="p{{ loop.index }}"
            class="btn btn-outline-primary btn-sm"
            onclick="goToQuestion({{ loop.index }})">
        {{ loop.index }}
    </button>
    {% endfor %}
</div>

<script>
let time = 120;

setInterval(() => {
    time--;
    document.getElementById("timer").innerHTML = "Time: " + time;

    if (time <= 0) {
        document.getElementById("examForm").submit();
    }
}, 1000);

function goToQuestion(num) {
    document.getElementById("q" + num).scrollIntoView({behavior: "smooth"});
    setCurrent(num);
}

function setCurrent(num) {
    document.querySelectorAll(".palette button").forEach(btn => {
        btn.classList.remove("current");
    });
    document.getElementById("p" + num).classList.add("current");
}

function saveAnswer(qid, index) {
    document.getElementById("p" + index).classList.add("answered");
    updateProgress();
}

function updateProgress() {
    let total = {{ questions|length }};
    let answered = document.querySelectorAll(".answered").length;
    let percent = total > 0 ? Math.round((answered / total) * 100) : 0;

    let bar = document.getElementById("progressBar");
    bar.style.width = percent + "%";
    bar.innerHTML = percent + "%";
}

document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
        alert("Do not switch tabs during the exam.");
    }
});

document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
